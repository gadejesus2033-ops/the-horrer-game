<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escape City - Fixed Levels</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
 position:absolute; top:10px; left:10px;
 color:white; font-family:monospace;
}
</style>
</head>
<body>

<div id="ui">Level 1</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer, light;
let keys={}, yaw=0, pitch=0;
let velocityY=0, onGround=true;

let level=1;
let collected=0;

let collectibles=[], enemies=[], safeZones=[], powerups=[];
let exit=null;
let worldObjects=[];

let speedBoost=false, freeze=false;

init();
startLevel();

function init(){
 scene=new THREE.Scene();
 scene.fog=new THREE.Fog(0x000000,10,150);

 camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
 camera.position.set(0,2,10);

 renderer=new THREE.WebGLRenderer();
 renderer.setSize(innerWidth,innerHeight);
 document.body.appendChild(renderer.domElement);

 light=new THREE.PointLight(0xffffff,1,60);
 scene.add(light);

 document.addEventListener("keydown",e=>keys[e.code]=true);
 document.addEventListener("keyup",e=>keys[e.code]=false);

 document.body.onclick=()=>document.body.requestPointerLock();

 document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement){
   yaw-=e.movementX*0.002;
   pitch-=e.movementY*0.002;
   pitch=Math.max(-1.5,Math.min(1.5,pitch));
   camera.rotation.set(pitch,yaw,0);
  }
 });

 animate();
}

// CLEAR EVERYTHING
function clearLevel(){
 worldObjects.forEach(obj=>scene.remove(obj));
 worldObjects=[];

 collectibles=[]; enemies=[]; safeZones=[]; powerups=[];
 exit=null;
}

// CREATE OBJECT + TRACK
function add(obj){
 scene.add(obj);
 worldObjects.push(obj);
 return obj;
}

function startLevel(){
 clearLevel();
 collected=0;
 speedBoost=false;
 freeze=false;

 // ground
 let ground = add(new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x111111})
 ));
 ground.rotation.x=-Math.PI/2;

 // buildings
 for(let i=0;i<30+level*10;i++){
  let h=Math.random()*20+5;
  let b=add(new THREE.Mesh(
   new THREE.BoxGeometry(5,h,5),
   new THREE.MeshStandardMaterial({color:0x222222})
  ));
  b.position.set((Math.random()-0.5)*120,h/2,(Math.random()-0.5)*120);
 }

 // keys
 for(let i=0;i<2+level;i++){
  let k=add(new THREE.Mesh(
   new THREE.SphereGeometry(0.5),
   new THREE.MeshStandardMaterial({color:0xffff00})
  ));
  k.position.set((Math.random()-0.5)*100,1,(Math.random()-0.5)*100);
  collectibles.push(k);
 }

 // exit
 exit = add(new THREE.Mesh(
  new THREE.CylinderGeometry(2,2,8),
  new THREE.MeshStandardMaterial({color:0x00ffff})
 ));
 exit.position.set(0,4,-100);

 // enemies
 for(let i=0;i<level+2;i++){
  let e=add(new THREE.Mesh(
   new THREE.SphereGeometry(1.5),
   new THREE.MeshStandardMaterial({color:0xff0000})
  ));
  e.position.set((Math.random()-0.5)*80,2,(Math.random()-0.5)*80);
  enemies.push(e);
 }

 // safe zones
 for(let i=0;i<2;i++){
  let s=add(new THREE.Mesh(
   new THREE.CylinderGeometry(5,5,0.2,32),
   new THREE.MeshStandardMaterial({color:0x00ff00})
  ));
  s.position.set((Math.random()-0.5)*100,0.1,(Math.random()-0.5)*100);
  safeZones.push(s);
 }

 // powerups
 let speedOrb = add(new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshStandardMaterial({color:0x0000ff})
 ));
 speedOrb.position.set(20,1,20);
 powerups.push({mesh:speedOrb,type:"speed"});

 let freezeOrb = add(new THREE.Mesh(
  new THREE.SphereGeometry(1),
  new THREE.MeshStandardMaterial({color:0xaa00ff})
 ));
 freezeOrb.position.set(-20,1,-20);
 powerups.push({mesh:freezeOrb,type:"freeze"});

 updateUI();
}

function updateUI(){
 document.getElementById("ui").innerText =
  "Level "+level+" | Keys: "+collected+" / "+collectibles.length;
}

// movement
function move(){
 let speed=speedBoost?0.3:0.15;

 let f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 let r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

 if(keys["KeyW"]) camera.position.add(f.clone().multiplyScalar(-speed));
 if(keys["KeyS"]) camera.position.add(f.clone().multiplyScalar(speed));
 if(keys["KeyA"]) camera.position.add(r.clone().multiplyScalar(-speed));
 if(keys["KeyD"]) camera.position.add(r.clone().multiplyScalar(speed));

 if(keys["Space"] && onGround){
  velocityY=0.25;
  onGround=false;
 }

 velocityY-=0.01;
 camera.position.y+=velocityY;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 }
}

function isSafe(){
 return safeZones.some(z=>z.position.distanceTo(camera.position)<5);
}

function updateEnemies(){
 if(freeze) return;

 enemies.forEach(e=>{
  if(isSafe()) return;

  let dir=camera.position.clone().sub(e.position).normalize();
  e.position.add(dir.multiplyScalar(0.05+level*0.01));

  if(e.position.distanceTo(camera.position)<2){
   alert("Caught!");
   location.reload();
  }
 });
}

function checkCollect(){
 collectibles.forEach((k,i)=>{
  if(k && k.position.distanceTo(camera.position)<2){
   scene.remove(k);
   collectibles[i]=null;
   collected++;
   updateUI();
  }
 });
}

function checkPowerups(){
 powerups.forEach(p=>{
  if(p.mesh && p.mesh.position.distanceTo(camera.position)<2){
   if(p.type==="speed"){
    speedBoost=true;
    setTimeout(()=>speedBoost=false,4000);
   }
   if(p.type==="freeze"){
    freeze=true;
    setTimeout(()=>freeze=false,4000);
   }
   scene.remove(p.mesh);
   p.mesh=null;
  }
 });
}

function checkExit(){
 if(collected===collectibles.length &&
    camera.position.distanceTo(exit.position)<4){

  level++;

  if(level>5){
   alert("YOU BEAT THE GAME!");
   location.reload();
  }else{
   alert("Level Complete!");
   startLevel();
  }
 }
}

// LOOP
function animate(){
 requestAnimationFrame(animate);

 move();
 updateEnemies();
 checkCollect();
 checkPowerups();
 checkExit();

 light.position.copy(camera.position);

 renderer.render(scene,camera);
}
</script>

</body>
</html>

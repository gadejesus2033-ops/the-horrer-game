<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escape City - Working</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
 position:absolute; top:10px; left:10px;
 color:white; font-family:monospace;
}
</style>
</head>
<body>

<div id="ui">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ✅ LIGHT FIX (this was the main problem)
let ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

let light = new THREE.PointLight(0xffffff,1);
scene.add(light);

camera.position.set(0,2,10);

// UI
let ui = document.getElementById("ui");

// CONTROLS
let keys = {};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

document.body.onclick = ()=>document.body.requestPointerLock();

let yaw=0,pitch=0;
document.addEventListener("mousemove",e=>{
 if(document.pointerLockElement){
  yaw -= e.movementX*0.002;
  pitch -= e.movementY*0.002;
  pitch = Math.max(-1.5,Math.min(1.5,pitch));
  camera.rotation.set(pitch,yaw,0);
 }
});

// PLAYER
let velocityY=0,onGround=true;

// LEVEL DATA
let level=1;
let collected=0;
let objects=[], enemies=[], keysList=[];
let exit;

// CLEAR
function clearWorld(){
 objects.forEach(o=>scene.remove(o));
 objects=[]; enemies=[]; keysList=[];
}

// ADD HELPER
function add(obj){
 scene.add(obj);
 objects.push(obj);
 return obj;
}

// START LEVEL
function startLevel(){
 clearWorld();
 collected=0;

 // ground
 let g = add(new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x333333})
 ));
 g.rotation.x=-Math.PI/2;

 // buildings
 for(let i=0;i<30+level*5;i++){
  let h=5+Math.random()*15;
  let b=add(new THREE.Mesh(
   new THREE.BoxGeometry(5,h,5),
   new THREE.MeshStandardMaterial({color:0x555555})
  ));
  b.position.set((Math.random()-0.5)*100,h/2,(Math.random()-0.5)*100);
 }

 // keys
 for(let i=0;i<level+2;i++){
  let k=add(new THREE.Mesh(
   new THREE.SphereGeometry(0.5),
   new THREE.MeshStandardMaterial({color:0xffff00})
  ));
  k.position.set((Math.random()-0.5)*80,1,(Math.random()-0.5)*80);
  keysList.push(k);
 }

 // enemies
 for(let i=0;i<level+1;i++){
  let e=add(new THREE.Mesh(
   new THREE.SphereGeometry(1.5),
   new THREE.MeshStandardMaterial({color:0xff0000})
  ));
  e.position.set((Math.random()-0.5)*50,2,(Math.random()-0.5)*50);
  enemies.push(e);
 }

 // exit
 exit = add(new THREE.Mesh(
  new THREE.BoxGeometry(3,6,3),
  new THREE.MeshStandardMaterial({color:0x00ffff})
 ));
 exit.position.set(0,3,-90);

 updateUI();
}

// UI
function updateUI(){
 ui.innerText = "Level "+level+" | Keys "+collected+" / "+keysList.length;
}

// MOVE
function move(){
 let speed=0.15;

 let f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 let r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

 if(keys["KeyW"]) camera.position.add(f.clone().multiplyScalar(-speed));
 if(keys["KeyS"]) camera.position.add(f.clone().multiplyScalar(speed));
 if(keys["KeyA"]) camera.position.add(r.clone().multiplyScalar(-speed));
 if(keys["KeyD"]) camera.position.add(r.clone().multiplyScalar(speed));

 // jump
 if(keys["Space"] && onGround){
  velocityY=0.25;
  onGround=false;
 }

 velocityY-=0.01;
 camera.position.y+=velocityY;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 }
}

// GAME LOGIC
function update(){
 // collect
 keysList.forEach((k,i)=>{
  if(k && k.position.distanceTo(camera.position)<2){
   scene.remove(k);
   keysList[i]=null;
   collected++;
   updateUI();
  }
 });

 // enemies
 enemies.forEach(e=>{
  let dir=camera.position.clone().sub(e.position).normalize();
  e.position.add(dir.multiplyScalar(0.04+level*0.01));

  if(e.position.distanceTo(camera.position)<2){
   alert("Caught!");
   location.reload();
  }
 });

 // exit
 if(collected===keysList.filter(k=>k).length &&
    camera.position.distanceTo(exit.position)<4){

  level++;
  if(level>5){
   alert("YOU WIN!");
   location.reload();
  }else{
   startLevel();
  }
 }
}

// LOOP
function animate(){
 requestAnimationFrame(animate);

 move();
 update();

 light.position.copy(camera.position);

 renderer.render(scene,camera);
}

// START
startLevel();
animate();
</script>

</body>
</html>

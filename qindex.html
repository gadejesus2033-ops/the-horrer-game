<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escape City - Distinct Levels</title>
<style>
body { margin:0; overflow:hidden; background:black; }

#menu {
 position:absolute; width:100%; height:100%;
 background:black; color:white;
 display:flex; flex-direction:column;
 align-items:center; justify-content:center;
 font-family:monospace;
}

#ui {
 position:absolute; top:10px; left:10px;
 color:white; font-family:monospace;
}

#map {
 position:absolute; top:10px; right:10px;
 width:150px; height:150px;
 background:#111; border:2px solid white;
}
</style>
</head>
<body>

<div id="menu">
<h1>Escape City</h1>
<p>WASD Move | Mouse Look | Space Jump | F Flashlight</p>
<button onclick="startGame()">START</button>
</div>

<div id="ui"></div>
<canvas id="map"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// ---------- SETUP ----------
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,10);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

let flashlight = new THREE.SpotLight(0xffffff,2,120,Math.PI/6);
scene.add(flashlight);
scene.add(flashlight.target);

let flashlightOn = true;

// INPUT
let keys = {};
document.addEventListener("keydown",e=>{
 keys[e.code]=true;
 if(e.code==="KeyF") flashlightOn=!flashlightOn;
});
document.addEventListener("keyup",e=>keys[e.code]=false);

// MOUSE
let yaw=0,pitch=0;
document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove",e=>{
 if(document.pointerLockElement){
  yaw-=e.movementX*0.002;
  pitch-=e.movementY*0.002;
  pitch=Math.max(-1.5,Math.min(1.5,pitch));
  camera.rotation.set(pitch,yaw,0);
 }
});

// PLAYER
let velocityY=0,onGround=true;

// GAME STATE
let level=1,collected=0;
let objects=[], enemies=[], keysList=[];
let exit;

// MAP
let ctx=document.getElementById("map").getContext("2d");

// ---------- HELPERS ----------
function add(obj){
 scene.add(obj);
 objects.push(obj);
 return obj;
}

function clearWorld(){
 objects.forEach(o=>scene.remove(o));
 objects=[]; enemies=[]; keysList=[];
}

// ---------- DISTINCT LEVELS ----------
function startLevel(){
 clearWorld();
 collected=0;

 let groundColor=0x222222;
 let buildingCount=40;
 let mapSize=120;
 let enemyCount=level+2;

 if(level===1){ buildingCount=20; mapSize=80; }
 if(level===2){ buildingCount=70; mapSize=100; }
 if(level===3){ buildingCount=15; mapSize=180; enemyCount=8; }
 if(level===4){ buildingCount=100; mapSize=90; }
 if(level===5){ buildingCount=10; mapSize=200; enemyCount=15; groundColor=0x440000; }

 // ground
 let g=add(new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({color:groundColor})
 ));
 g.rotation.x=-Math.PI/2;

 // buildings
 for(let i=0;i<buildingCount;i++){
  let h=5+Math.random()*20;
  let b=add(new THREE.Mesh(
   new THREE.BoxGeometry(5,h,5),
   new THREE.MeshStandardMaterial({color:0x444444})
  ));

  if(level===4){
   b.position.set((i%10)*10-50,h/2,Math.floor(i/10)*10-50);
  } else {
   b.position.set((Math.random()-0.5)*mapSize,h/2,(Math.random()-0.5)*mapSize);
  }
 }

 // keys
 for(let i=0;i<level+2;i++){
  let k=add(new THREE.Mesh(
   new THREE.SphereGeometry(0.6),
   new THREE.MeshStandardMaterial({color:0xffff00,emissive:0x555500})
  ));
  k.position.set((Math.random()-0.5)*mapSize,1,(Math.random()-0.5)*mapSize);
  keysList.push(k);
 }

 // enemies
 for(let i=0;i<enemyCount;i++){
  let size = level===5 ? 3 : 1.5;
  let e=add(new THREE.Mesh(
   new THREE.SphereGeometry(size),
   new THREE.MeshStandardMaterial({color:0xff0000,emissive:0x330000})
  ));
  e.position.set((Math.random()-0.5)*mapSize,2,(Math.random()-0.5)*mapSize);
  enemies.push(e);
 }

 // exit
 exit=add(new THREE.Mesh(
  new THREE.BoxGeometry(3,6,3),
  new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x004444})
 ));
 exit.position.set(0,3,-mapSize/2);

 updateUI();
}

// ---------- UI ----------
function updateUI(){
 document.getElementById("ui").innerText =
  "Level "+level+" | Keys "+collected+" / "+keysList.length;
}

// ---------- MOVE ----------
function move(){
 let speed=0.15;

 let f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 let r=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

 if(keys["KeyW"]) camera.position.add(f.clone().multiplyScalar(-speed));
 if(keys["KeyS"]) camera.position.add(f.clone().multiplyScalar(speed));
 if(keys["KeyA"]) camera.position.add(r.clone().multiplyScalar(-speed));
 if(keys["KeyD"]) camera.position.add(r.clone().multiplyScalar(speed));

 if(keys["Space"] && onGround){
  velocityY=0.25;
  onGround=false;
 }

 velocityY-=0.01;
 camera.position.y+=velocityY;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 }
}

// ---------- GAME ----------
function updateGame(){

 keysList.forEach((k,i)=>{
  if(k && k.position.distanceTo(camera.position)<2){
   scene.remove(k);
   keysList[i]=null;
   collected++;
   updateUI();
  }
 });

 enemies.forEach(e=>{
  e.position.lerp(camera.position,0.002+level*0.001);

  if(e.position.distanceTo(camera.position)<2){
   alert("Caught!");
   location.reload();
  }
 });

 if(collected===keysList.filter(k=>k).length &&
    camera.position.distanceTo(exit.position)<4){

  level++;
  if(level>5){
   alert("YOU WIN!");
   location.reload();
  } else {
   startLevel();
  }
 }
}

// ---------- MAP ----------
function drawMap(){
 ctx.fillStyle="#111";
 ctx.fillRect(0,0,150,150);

 function dot(x,z,color){
  ctx.fillStyle=color;
  ctx.fillRect(75+x,75+z,4,4);
 }

 dot(camera.position.x/2,camera.position.z/2,"white");
 enemies.forEach(e=>dot(e.position.x/2,e.position.z/2,"red"));
}

// ---------- LOOP ----------
function animate(){
 requestAnimationFrame(animate);

 move();
 updateGame();

 flashlight.visible=flashlightOn;
 flashlight.position.copy(camera.position);
 flashlight.target.position.set(
  camera.position.x+Math.sin(yaw),
  camera.position.y+Math.sin(pitch),
  camera.position.z+Math.cos(yaw)
 );

 drawMap();
 renderer.render(scene,camera);
}

// ---------- START ----------
function startGame(){
 document.getElementById("menu").style.display="none";
 startLevel();
}

animate();
</script>

</body>
</html>
